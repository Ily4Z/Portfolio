    <style>
        /* --- STYLE GLOBAL --- */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050a14;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        #mynetwork {
            width: 100%;
            height: 100%;
            display: block;
            background: radial-gradient(circle at center, #0f172a 0%, #050a14 100%);
        }

        /* --- LE HUD (Panneau d'information) --- */
        #info-card {
            position: fixed;
            top: 0;
            right: -650px; /* Caché par défaut */
            width: 500px;
            max-width: 90%;
            height: 100vh;
            background: rgba(10, 15, 30, 0.98);
            border-left: 1px solid #1e293b;
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.8);
            padding: 30px;
            box-sizing: border-box;
            transition: right 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            z-index: 1000;
            overflow-y: auto;
        }

        #info-card.active { right: 0; }

        /* Typographie */
        .card-header { border-bottom: 2px solid #00d2ff; padding-bottom: 15px; margin-bottom: 20px; }
        h2 { margin: 0; color: #fff; font-size: 1.8rem; text-transform: uppercase; letter-spacing: 1px; }
        .subtitle { color: #00d2ff; font-weight: bold; font-size: 0.9rem; margin-top: 5px; display: block; }
        
        p { line-height: 1.6; color: #cbd5e1; font-size: 1rem; margin-bottom: 20px; }

        /* Multimédia (Vidéo & Images) */
        .media-container {
            margin-bottom: 20px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #334155;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            background: black;
        }
        .project-video { width: 100%; display: block; outline: none; }
        .project-img { width: 100%; display: block; }

        /* Boutons */
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
        
        .btn-download {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #2563eb;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.9em;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-download:hover { background: #1d4ed8; }
        .btn-download.secondary { background: #475569; }
        .btn-download.secondary:hover { background: #64748b; }
        .btn-download.accent { background: #d97706; }
        .btn-download.accent:hover { background: #b45309; }

        /* Badges et Listes */
        .wip-badge { background: #f59e0b; color: black; font-size: 0.75rem; padding: 2px 8px; border-radius: 10px; font-weight: bold; vertical-align: middle; margin-left: 8px; }
        .live-badge { background: #10b981; color: white; font-size: 0.75rem; padding: 2px 8px; border-radius: 10px; font-weight: bold; vertical-align: middle; margin-left: 8px; }
        
        ul.skills-list { list-style: none; padding: 0; }
        ul.skills-list li {
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 8px;
            padding: 10px 15px;
            border-radius: 6px;
            border-left: 3px solid #34d399;
            color: #e2e8f0;
        }
        ul.skills-list.exp li { border-left-color: #a855f7; }

        /* Divers */
        .close-btn { position: absolute; top: 20px; right: 20px; background: none; border: none; color: #64748b; font-size: 2rem; cursor: pointer; }
        .close-btn:hover { color: white; }
        
        #intro-overlay {
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            text-align: center; pointer-events: none; opacity: 1; transition: opacity 1s;
            z-index: 10;
        }
        .intro-text { background: rgba(10, 15, 30, 0.8); padding: 10px 25px; border-radius: 30px; border: 1px solid #1e293b; color: #94a3b8; font-size: 0.9rem; }

        /* --- RESPONSIVE MOBILE --- */
        @media screen and (max-width: 768px) {
            #info-card {
                width: 100%;
                right: -100%;
                padding: 20px;
                border-left: none;
            }
            h2 { font-size: 1.5rem; }
            .close-btn { top: 15px; right: 15px; font-size: 2.5rem; padding: 10px; z-index: 1001; }
            #intro-overlay { display: none; }
        }
    </style>
</head>
<body>

    <script type="text/javascript">

                        <a href="https://www.linkedin.com/in/ilyas-el-aamery-01a0612a9/" target="_blank" class="btn-download">

            // --- RECHERCHE ALTERNANCE (NŒUD D'ALERTE) ---
            5: {

                subtitle: "Contrat d'Apprentissage — Rentrée 2026",
                html: `
                    <span class="live-badge">Disponibilité : Septembre 2026</span>
                    <p style="margin-top:15px;">Dans le cadre de ma troisième année de formation, je recherche activement une entreprise d'accueil pour concrétiser mes compétences de terrain.</p>
                    <ul class="skills-list" style="border-left-color: #f59e0b;">

                        <li><strong>Formation :</strong> BUT Informatique (Parcours Déploiement d'Applications Communiquantes et Sécurisées)</li>
                        <li><strong>Rythme :</strong> Alternance par périodes de blocs spécifiques</li>
                        <li><strong>Mobilité :</strong> Metz / Nancy et environs</li>
                    </ul>
                    <div class="btn-group">
                        <a href="assets/docs/cv_el-aamery_ilyas.pdf" target="_blank" class="btn-download accent">
                            <i class="fas fa-file-pdf"></i> Consulter mon CV (FR)
                        </a>
                        <a href="assets/docs/resume_el-aamery_ilyas.pdf" target="_blank" class="btn-download secondary">
                            <i class="fas fa-file-pdf"></i> Resume (EN)
                        </a>

            },

            // --- CATEGORIES ---
            2: { title: "PROJETS", subtitle: "Portfolio de réalisations", html: "<p>Sélectionnez un équipement ou projet connecté pour visionner la démonstration.</p>" },
            3: { title: "COMPÉTENCES", subtitle: "Hard Skills & Outils", html: "<p>Détail de mes pôles de compétences opérationnels.</p>" },
            6: { title: "EXPÉRIENCES PRO", subtitle: "Parcours en Entreprise", html: "<p>Cliquez sur les infrastructures d'accueil pour voir le détail de mes missions.</p>" },

            // --- EXPERIENCES EN ENTREPRISE ---
            61: {

                    <ul class="skills-list">

                        <li><strong>Application :</strong> Frontend en TypeScript connecté à une base relationnelle SQL.</li>
                    </ul>
                `
            },
            22: {
                title: "JeuX",
                subtitle: "Application de plateau en Langage C",
                html: `
                    <p>Développement d'un moteur de jeu de stratégie bidimensionnel intégrant le calcul dynamique matriciel des scores.</p>
                    <div class="media-container">

                    </div>

            23: {

                html: `

                    <div class="media-container">
                        <video controls class="project-video">

                        </video>
                    </div>
                    <p><strong>Pôle :</strong> Scripting Bash, expressions régulières (Regex), sécurité système.</p>

            },
            25: {

                subtitle: "Modélisation Relationnelle (SQL)",
                html: `
                    <p>Étude, conception et requêtage d'une base de données complexe simulant la gestion d'un parc animalier (animaux, enclos, affectations).</p>
                    <p><strong>Pôle :</strong> Rédaction des modèles conceptuels (MCD/MLD), requêtes imbriquées, jointures avancées.</p>

            },
            26: {
                title: "E-Vitrine Formule 1",
                subtitle: "Intégration Web Responsive",
                html: `

                    <div class="btn-group">

            },

            // --- COMPÉTENCES ---
            31: { title: "Réseau (Cisco)", html: "<ul class='skills-list'><li>Architecture VLAN, Trunking 802.1Q</li><li>Routage dynamique OSPF, statique, NAT/PAT</li><li>Filtrage par ACL (Access Control Lists)</li></ul>" },
            32: { title: "SysAdmin", html: "<ul class='skills-list'><li>Administration Linux (Debian, Ubuntu Server)</li><li>Hyperviseurs VMware ESXi / Workstation</li><li>Gestion Active Directory (Utilisateurs/Droits)</li></ul>" },
            33: { title: "Développement", html: "<ul class='skills-list'><li>Backend / Données : PHP, requêtes SQL</li><li>Frontend : HTML5, CSS3, TypeScript</li><li>Méthodologie : Versioning via Git / GitHub</li></ul>" }
        };

        // ==========================================
        // 2. CONFIGURATION DE LA TOPOLOGIE (VIS.JS)
        // ==========================================
        var nodes = new vis.DataSet([
            // Centre
            { id: 1, shape: 'circularImage', image: 'assets/img/photo_ilyas.jpeg', size: 55, borderWidth: 4, color: { border: '#00d2ff', background: '#fff' }, label: "ILYAS" },

            // ALERTE CRITIQUE (Alternance)
            { id: 5, label: '🚨 ALTERNANCE\nSEPT. 2026', shape: 'dot', size: 26, color: '#f59e0b', font:{color:'#f59e0b', size:15, bold:true} },

            // Planètes principales
            { id: 2, label: 'PROJETS', shape: 'dot', size: 22, color: '#00d2ff', font:{color:'white', size:15} },
            { id: 6, label: 'EXPÉRIENCES', shape: 'dot', size: 22, color: '#a855f7', font:{color:'white', size:15} },
            { id: 3, label: 'SKILLS', shape: 'dot', size: 22, color: '#34d399', font:{color:'white', size:15} },
            { id: 4, label: 'CONTACT', shape: 'dot', size: 18, color: '#f472b6', font:{color:'white', size:14} },

            // --- SOUS-NŒUDS EXPÉRIENCES ---
            { id: 61, label: 'Stage IT\n(Demathieu Bard)', shape: 'box', color: '#581c87', font:{color:'white'} },

            // --- SOUS-NŒUDS PROJETS ---
            { id: 21, label: 'Just Park It\n(Transversal)', shape: 'circularImage', image: 'assets/img/logo_jp.png', size: 35, borderWidth: 2, color: {border:'#00d2ff'} },
            { id: 22, label: 'JeuX\n(C)', shape: 'box', color: '#1e3a8a', font:{color:'white'} },
            { id: 23, label: 'Nim\n(C)', shape: 'box', color: '#1e3a8a', font:{color:'white'} },
            { id: 24, label: 'Logs\n(Bash)', shape: 'box', color: '#1e3a8a', font:{color:'white'} },
            { id: 25, label: 'Zoo\n(SQL)', shape: 'box', color: '#1e3a8a', font:{color:'white'} },
            { id: 26, label: 'F1 Site\n(Web)', shape: 'box', color: '#1e3a8a', font:{color:'white'} },

            // --- SOUS-NŒUDS SKILLS ---
            { id: 31, label: 'Cisco', shape: 'ellipse', color: '#064e3b', font:{color:'#a7f3d0'} },
            { id: 32, label: 'SysAdmin', shape: 'ellipse', color: '#064e3b', font:{color:'#a7f3d0'} },
            { id: 33, label: 'Dev', shape: 'ellipse', color: '#064e3b', font:{color:'#a7f3d0'} }
        ]);

        var edges = new vis.DataSet([
            // Liens vers le centre
            { from: 1, to: 2, width: 2, color: { color: 'rgba(255,255,255,0.1)' } },
            { from: 1, to: 3, width: 2, color: { color: 'rgba(255,255,255,0.1)' } },
            { from: 1, to: 4, width: 2, color: { color: 'rgba(255,255,255,0.1)' } },
            { from: 1, to: 6, width: 2, color: { color: 'rgba(255,255,255,0.1)' } },
            
            // Lien d'alerte haute priorité (Alternance)
            { from: 1, to: 5, width: 4, color: '#f59e0b', dashes: true, length: 140 },

            // Branche Expériences
            { from: 6, to: 61, length: 140, color: '#a855f7', width: 2 },

            // Branche Projets
            { from: 2, to: 21, length: 180, color: '#00d2ff', width: 2 },
            { from: 2, to: 22, length: 150, color: '#1e3a8a' },
            { from: 2, to: 23, length: 150, color: '#1e3a8a' },
            { from: 2, to: 24, length: 150, color: '#1e3a8a' },
            { from: 2, to: 25, length: 150, color: '#1e3a8a' },
            { from: 2, to: 26, length: 150, color: '#1e3a8a' },

            // Branche Skills
            { from: 3, to: 31, color: '#34d399' },
            { from: 3, to: 32, color: '#34d399' },
            { from: 3, to: 33, color: '#34d399' }
        ]);

        // Moteur de rendu
        var container = document.getElementById('mynetwork');
        var data = { nodes: nodes, edges: edges };
        var options = {
            nodes: { font: { face: 'Segoe UI', color: '#ffffff', size: 14 }, borderWidth: 1, shadow: true },
            edges: { width: 1, smooth: { type: 'continuous', forceDirection: 'none' } },
            physics: { stabilization: false, barnesHut: { gravitationalConstant: -3800, springConstant: 0.03, springLength: 180 } },
            interaction: { hover: true }
        };

        var network = new vis.Network(container, data, options);

        // ==========================================
        // 3. LOGIQUE D'INTERACTION ET SÉQUENCE AUTOMATIQUE
        // ==========================================
        
        // Fonction d'ouverture d'une fiche
        function openNodeCard(nodeId) {
            const info = contentData[nodeId];
            if (info) {
                const htmlContent = `
                    <div class="card-header">
                        <h2>${info.title}</h2>
                        <span class="subtitle">${info.subtitle || ''}</span>
                    </div>
                    <div>${info.html}</div>
                `;
                document.getElementById('card-content').innerHTML = htmlContent;
                document.getElementById('info-card').classList.add('active');

                const isMobile = window.innerWidth < 768;
                const offsetX = isMobile ? 0 : -250;
                const newScale = isMobile ? 0.9 : 1.2;

                network.focus(nodeId, {
                    scale: newScale,
                    offset: { x: offsetX, y: 0 },
                    animation: { duration: 800, easingFunction: "easeInOutQuad" }
                });
            }
        }

        // Clic utilisateur
        network.on("click", function (params) {
            document.getElementById('intro-overlay').style.opacity = '0';
            if (params.nodes.length > 0) {
                openNodeCard(params.nodes[0]);
            } else {
                closeCard();
            }
        });

        function closeCard() {
            document.getElementById('info-card').classList.remove('active');
            network.fit({ animation: { duration: 800, easingFunction: "easeInOutQuad" } });
        }

        // --- BOOT SEQUENCE : OUVERTURE AUTOMATIQUE SUR L'ALTERNANCE ---
        // Exécution automatique après stabilisation initiale du graphe (1,2 seconde)
        setTimeout(() => {
            network.selectNodes([5]); // Met en surbrillance le nœud d'alternance
            openNodeCard(5);          // Ouvre automatiquement sa fiche descriptive
        }, 1200);

    </script>
</body>
</html>
